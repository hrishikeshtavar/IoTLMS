
services:
  postgres:
    image: postgres:16-alpine
    container_name: iotlearn_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: iotlearn
      POSTGRES_USER: iotlearn_user
      POSTGRES_PASSWORD: iotlearn_pass
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: iotlearn_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: iotlearn_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: iotlearn_admin
      MINIO_ROOT_PASSWORD: iotlearn_secret
    volumes:
      - miniodata:/data

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: iotlearn_meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  miniodata:
  meilidata:
